<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Gradient arka plan -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0FDFA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CCFBF1;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Logo - Ortada büyük -->
  <g transform="translate(400, 200)">
    <!-- Terazi kolu (üst çizgi) -->
    <line x1="0" y1="30" x2="160" y2="30" stroke="#14B8A6" stroke-width="6"/>
    
    <!-- Sol zincir -->
    <line x1="0" y1="30" x2="0" y2="90" stroke="#14B8A6" stroke-width="4"/>
    <!-- Sağ zincir -->
    <line x1="160" y1="30" x2="160" y2="90" stroke="#14B8A6" stroke-width="4"/>
    
    <!-- Gözler (yuvarlak panlar) -->
    <circle cx="0" cy="90" r="12" fill="#14B8A6"/>
    <circle cx="160" cy="90" r="12" fill="#14B8A6"/>
    
    <!-- Gülümseme (eğri ağız) -->
    <path d="M20 110 Q80 150 140 110" stroke="#14B8A6" stroke-width="4" stroke-linecap="round"/>
  </g>
  
  <!-- Ana başlık -->
  <text x="600" y="400" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-size="56" 
        font-weight="700" 
        fill="#14B8A6" 
        text-anchor="middle">
    avukatajanda.com
  </text>
  
  <!-- Alt başlık -->
  <text x="600" y="460" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-size="28" 
        font-weight="400" 
        fill="#0D9488" 
        text-anchor="middle">
    Hukuk Büronuz İçin Akıllı Çözüm
  </text>
</svg>