<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Beyaz arka plan -->
  <rect width="512" height="512" fill="#ffffff" rx="64"/>
  
  <!-- Gülümseyen Terazi - Merkezde ve büyük -->
  <g transform="translate(96,128)" stroke="#2ecc71" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Terazi Kirişi -->
    <path d="M0,0 L320,0" stroke-width="19"/>
    
    <!-- Pivot -->
    <circle cx="160" cy="0" r="16" fill="#2ecc71"/>
    
    <!-- Zincirler -->
    <line x1="53" y1="0" x2="53" y2="107" stroke-width="13"/>
    <line x1="267" y1="0" x2="267" y2="107" stroke-width="13"/>
    
    <!-- Kefeler (Gözler) -->
    <circle cx="53" cy="107" r="26" fill="#2ecc71" stroke="none"/>
    <circle cx="267" cy="107" r="26" fill="#2ecc71" stroke="none"/>
    
    <!-- Gülümseme -->
    <path d="M27 133 Q160 227 293 133" stroke="#2ecc71" stroke-width="16"/>
  </g>
</svg>