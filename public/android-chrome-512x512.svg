<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Beyaz arka plan -->
  <rect width="512" height="512" fill="#ffffff" rx="64"/>
  
  <!-- Gülümseyen Terazi Görseli - Merkezde ve büyük -->
  <g transform="translate(85, 115)">
    <!-- Terazi kolu (üst çizgi) -->
    <line x1="0" y1="64" x2="342" y2="64" stroke="#14B8A6" stroke-width="17"/>
    
    <!-- Sol zincir -->
    <line x1="0" y1="64" x2="0" y2="192" stroke="#14B8A6" stroke-width="13"/>
    <!-- Sağ zincir -->
    <line x1="342" y1="64" x2="342" y2="192" stroke="#14B8A6" stroke-width="13"/>
    
    <!-- Gözler (yuvarlak panlar) -->
    <circle cx="0" cy="192" r="34" fill="#14B8A6"/>
    <circle cx="342" cy="192" r="34" fill="#14B8A6"/>
    
    <!-- Gülümseme (eğri ağız) -->
    <path d="M43 235 Q171 321 299 235" stroke="#14B8A6" stroke-width="13" stroke-linecap="round"/>
  </g>
</svg>