<svg width="580" height="150" viewBox="0 0 580 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Arka Plan -->
  <rect width="100%" height="100%" fill="#ffffff" rx="12"/>
  
  <!-- Gülümseyen Terazi -->
  <g transform="translate(40,35)" stroke="#2ecc71" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Terazi Kirişi -->
    <path d="M0,0 L120,0" stroke-width="5"/>
    
    <!-- Pivot -->
    <circle cx="60" cy="0" r="4" fill="#2ecc71"/>
    
    <!-- Zincirler -->
    <line x1="20" y1="0" x2="20" y2="40" stroke-width="3.5"/>
    <line x1="100" y1="0" x2="100" y2="40" stroke-width="3.5"/>
    
    <!-- Kefeler (Gözler) -->
    <circle cx="20" cy="40" r="6" fill="#2ecc71" stroke="none"/>
    <circle cx="100" cy="40" r="6" fill="#2ecc71" stroke="none"/>
    
    <!-- Gülümseme -->
    <path d="M10 50 Q60 85 110 50" stroke="#2ecc71" stroke-width="4"/>
  </g>
  
  <!-- Ana Metin -->
  <text x="180" y="85" 
        font-family="Nunito, system-ui, -apple-system, sans-serif" 
        font-size="36" 
        font-weight="700" 
        fill="#2c3e50">
    avukatajanda.com
  </text>
  
  <!-- Alt Metin -->
  <text x="180" y="115" 
        font-family="Nunito, system-ui, -apple-system, sans-serif" 
        font-size="15" 
        font-weight="600" 
        fill="#7f8c8d">
    Profesyonel Avukat Ajanda Sistemi
  </text>
</svg>