<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Beyaz arka plan -->
  <rect width="120" height="120" fill="#ffffff"/>
  
  <!-- Gülümseyen Terazi Görseli - Merkezde -->
  <g transform="translate(20, 25)">
    <!-- Terazi kolu (üst çizgi) -->
    <line x1="0" y1="15" x2="80" y2="15" stroke="#14B8A6" stroke-width="4"/>
    
    <!-- Sol zincir -->
    <line x1="0" y1="15" x2="0" y2="45" stroke="#14B8A6" stroke-width="3"/>
    <!-- Sağ zincir -->
    <line x1="80" y1="15" x2="80" y2="45" stroke="#14B8A6" stroke-width="3"/>
    
    <!-- Gözler (yuvarlak panlar) -->
    <circle cx="0" cy="45" r="8" fill="#14B8A6"/>
    <circle cx="80" cy="45" r="8" fill="#14B8A6"/>
    
    <!-- Gülümseme (eğri ağız) -->
    <path d="M10 55 Q40 75 70 55" stroke="#14B8A6" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>