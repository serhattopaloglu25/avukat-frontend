<svg width="150" height="150" viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Beyaz arka plan -->
  <rect width="150" height="150" fill="#ffffff"/>
  
  <!-- Gülümseyen Terazi - Merkezde -->
  <g transform="translate(15,30)" stroke="#2ecc71" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Terazi Kirişi -->
    <path d="M0,0 L120,0" stroke-width="6"/>
    
    <!-- Pivot -->
    <circle cx="60" cy="0" r="5" fill="#2ecc71"/>
    
    <!-- Zincirler -->
    <line x1="20" y1="0" x2="20" y2="40" stroke-width="4"/>
    <line x1="100" y1="0" x2="100" y2="40" stroke-width="4"/>
    
    <!-- Kefeler (Gözler) -->
    <circle cx="20" cy="40" r="8" fill="#2ecc71" stroke="none"/>
    <circle cx="100" cy="40" r="8" fill="#2ecc71" stroke="none"/>
    
    <!-- Gülümseme -->
    <path d="M10 50 Q60 85 110 50" stroke="#2ecc71" stroke-width="5"/>
  </g>
</svg>