<svg width="180" height="180" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Beyaz arka plan -->
  <rect width="180" height="180" fill="#ffffff" rx="20"/>
  
  <!-- Gülümseyen Terazi Görseli - Merkezde -->
  <g transform="translate(30, 40)">
    <!-- Terazi kolu (üst çizgi) -->
    <line x1="0" y1="22" x2="120" y2="22" stroke="#14B8A6" stroke-width="6"/>
    
    <!-- Sol zincir -->
    <line x1="0" y1="22" x2="0" y2="68" stroke="#14B8A6" stroke-width="4.5"/>
    <!-- Sağ zincir -->
    <line x1="120" y1="22" x2="120" y2="68" stroke="#14B8A6" stroke-width="4.5"/>
    
    <!-- Gözler (yuvarlak panlar) -->
    <circle cx="0" cy="68" r="12" fill="#14B8A6"/>
    <circle cx="120" cy="68" r="12" fill="#14B8A6"/>
    
    <!-- Gülümseme (eğri ağız) -->
    <path d="M15 83 Q60 113 105 83" stroke="#14B8A6" stroke-width="4.5" stroke-linecap="round"/>
  </g>
</svg>