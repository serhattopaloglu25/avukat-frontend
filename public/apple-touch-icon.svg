<svg width="180" height="180" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
  <!-- Beyaz arka plan -->
  <rect width="180" height="180" fill="#ffffff" rx="20"/>
  
  <!-- Gülümseyen Terazi - Merkezde -->
  <g transform="translate(30,45)" stroke="#2ecc71" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Terazi Kirişi -->
    <path d="M0,0 L120,0" stroke-width="7"/>
    
    <!-- Pivot -->
    <circle cx="60" cy="0" r="6" fill="#2ecc71"/>
    
    <!-- Zincirler -->
    <line x1="20" y1="0" x2="20" y2="40" stroke-width="5"/>
    <line x1="100" y1="0" x2="100" y2="40" stroke-width="5"/>
    
    <!-- Kefeler (Gözler) -->
    <circle cx="20" cy="40" r="9" fill="#2ecc71" stroke="none"/>
    <circle cx="100" cy="40" r="9" fill="#2ecc71" stroke="none"/>
    
    <!-- Gülümseme -->
    <path d="M10 50 Q60 85 110 50" stroke="#2ecc71" stroke-width="6"/>
  </g>
</svg>