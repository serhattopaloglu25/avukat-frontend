<svg width="192" height="192" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Beyaz arka plan -->
  <rect width="192" height="192" fill="#ffffff" rx="24"/>
  
  <!-- Gülümseyen Terazi Görseli - Merkezde -->
  <g transform="translate(32, 43)">
    <!-- Terazi kolu (üst çizgi) -->
    <line x1="0" y1="24" x2="128" y2="24" stroke="#14B8A6" stroke-width="6.5"/>
    
    <!-- Sol zincir -->
    <line x1="0" y1="24" x2="0" y2="72" stroke="#14B8A6" stroke-width="5"/>
    <!-- Sağ zincir -->
    <line x1="128" y1="24" x2="128" y2="72" stroke="#14B8A6" stroke-width="5"/>
    
    <!-- Gözler (yuvarlak panlar) -->
    <circle cx="0" cy="72" r="13" fill="#14B8A6"/>
    <circle cx="128" cy="72" r="13" fill="#14B8A6"/>
    
    <!-- Gülümseme (eğri ağız) -->
    <path d="M16 88 Q64 120 112 88" stroke="#14B8A6" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>